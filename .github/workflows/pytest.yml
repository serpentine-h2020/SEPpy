# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: pytest

on:
  push:
    # branches: [ "main" ]
  pull_request:
    # branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install ruff
      run: |
        uv venv .venv
        source .venv/bin/activate
        uv pip install ruff
    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        # stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --exclude=.venv
        # exit-zero treats all errors as warnings
        ruff check . --select=E,F,C90 --ignore=E501 --exclude=.venv --exit-zero
        # summary
        ruff check . --select=E,F,C90 --ignore=E501 --exclude=.venv --statistics --quiet --exit-zero

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        uv venv .venv --python ${{ matrix.python-version }}
        source .venv/bin/activate
        uv pip install nbmake pytest pytest-doctestplus pytest-cov
        # uv pip install -r requirements.txt
        uv pip install .
    - name: Test with pytest
      run: |
        source .venv/bin/activate
        pytest --cov --nbmake .
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}